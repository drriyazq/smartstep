name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smartstep
          POSTGRES_USER: smartstep
          POSTGRES_PASSWORD: smartstep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartstep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://smartstep:smartstep@localhost:5432/smartstep
      DJANGO_SETTINGS_MODULE: smartstep.settings.dev
      DJANGO_SECRET_KEY: ci-insecure-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Generate initial migrations if missing
        working-directory: backend
        run: python manage.py makemigrations content rewards notifications --noinput
      - name: Migrations sanity check
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        working-directory: backend
        run: pytest -q

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Ensure Android platform exists
        working-directory: app
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name smartstep_app --org dev.smartstep .
          fi
      - name: Get deps
        working-directory: app
        run: flutter pub get
      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos
      - name: Unit tests
        working-directory: app
        run: flutter test
