name: smartstep_app
description: SmartStep — parent-facilitated life-skills app for kids 7–11.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  # HTTP
  dio: ^5.4.0
  # Local storage (child PII lives here only)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Markdown rendering
  flutter_markdown: ^0.7.3
  # Utilities
  intl: ^0.19.0
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
